<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 540" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="block4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="ar4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1280" height="540" fill="url(#bg4)"/>

  <text x="40" y="40" font-size="22" fill="#fff" font-weight="bold">CNN vs ViT backbone</text>
  <text x="40" y="60" font-size="12" fill="#9ca3af">Same DQN algorithm — different feature extractor. Both consume (4, 84, 84) and emit Q-values.</text>

  <!-- divider -->
  <line x1="640" y1="90" x2="640" y2="500" stroke="#334155" stroke-dasharray="6 4"/>

  <!-- LEFT CNN -->
  <g transform="translate(40,100)">
    <text x="0" y="0" font-size="16" fill="#22d3ee" font-weight="bold">CNN (DeepMind 2015)</text>
    <text x="0" y="20" font-size="11" fill="#9ca3af">Spatial inductive bias built in. Sample-efficient.</text>

    <!-- input -->
    <g transform="translate(0,40)">
      <rect width="80" height="80" fill="#0b1020" stroke="#22d3ee"/>
      <text x="40" y="98" font-size="10" fill="#9ca3af" text-anchor="middle">(4,84,84)</text>
    </g>

    <line x1="84" y1="80" x2="118" y2="80" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ar4)"/>

    <g transform="translate(120,42)">
      <rect width="100" height="76" fill="url(#block4)" stroke="#22d3ee"/>
      <text x="50" y="20" font-size="11" fill="#22d3ee" text-anchor="middle">Conv 8×8/4</text>
      <text x="50" y="36" font-size="10" fill="#cbd5e1" text-anchor="middle">→ 32 ch</text>
      <text x="50" y="54" font-size="10" fill="#9ca3af" text-anchor="middle">ReLU</text>
    </g>

    <line x1="222" y1="80" x2="256" y2="80" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ar4)"/>

    <g transform="translate(258,42)">
      <rect width="100" height="76" fill="url(#block4)" stroke="#22d3ee"/>
      <text x="50" y="20" font-size="11" fill="#22d3ee" text-anchor="middle">Conv 4×4/2</text>
      <text x="50" y="36" font-size="10" fill="#cbd5e1" text-anchor="middle">→ 64 ch</text>
      <text x="50" y="54" font-size="10" fill="#9ca3af" text-anchor="middle">ReLU</text>
    </g>

    <line x1="360" y1="80" x2="394" y2="80" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ar4)"/>

    <g transform="translate(396,42)">
      <rect width="100" height="76" fill="url(#block4)" stroke="#22d3ee"/>
      <text x="50" y="20" font-size="11" fill="#22d3ee" text-anchor="middle">Conv 3×3/1</text>
      <text x="50" y="36" font-size="10" fill="#cbd5e1" text-anchor="middle">→ 64 ch</text>
      <text x="50" y="54" font-size="10" fill="#9ca3af" text-anchor="middle">ReLU</text>
    </g>

    <!-- arrow down -->
    <line x1="446" y1="120" x2="446" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ar4)"/>

    <g transform="translate(0,170)">
      <rect width="500" height="50" fill="url(#block4)" stroke="#22d3ee"/>
      <text x="250" y="20" font-size="11" fill="#22d3ee" text-anchor="middle">Flatten → Linear 512 → ReLU → Linear n_actions</text>
      <text x="250" y="38" font-size="10" fill="#9ca3af" text-anchor="middle">~1.7M params</text>
    </g>

    <g transform="translate(0,250)" font-size="11" fill="#cbd5e1">
      <text y="0" fill="#22d3ee" font-weight="bold">Properties</text>
      <text y="22">+ translation-equivariant (free)</text>
      <text y="40">+ local receptive fields</text>
      <text y="58">+ converges fast (CNN-DQN: ~5M steps)</text>
      <text y="76">− fixed locality, no global view</text>
      <text y="94">− struggles on memory-required tasks</text>
    </g>

    <g transform="translate(0,360)" font-size="11" fill="#cbd5e1">
      <text y="0" fill="#22d3ee" font-weight="bold">Hyperparams</text>
      <text y="22">batch 32 · LR 2.5e-4 · target sync 10k</text>
      <text y="40">warmup 10k · grad ratio 1:4 · 40 envs</text>
      <text y="58" fill="#9ca3af">→ "default" Atari recipe works as-is</text>
    </g>
  </g>

  <!-- RIGHT ViT -->
  <g transform="translate(680,100)">
    <text x="0" y="0" font-size="16" fill="#a78bfa" font-weight="bold">ViT (this project)</text>
    <text x="0" y="20" font-size="11" fill="#9ca3af">Pure self-attention. No spatial prior. Data-hungry.</text>

    <g transform="translate(0,40)">
      <rect width="80" height="80" fill="#0b1020" stroke="#a78bfa"/>
      <text x="40" y="98" font-size="10" fill="#9ca3af" text-anchor="middle">(4,84,84)</text>
    </g>

    <line x1="84" y1="80" x2="118" y2="80" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ar4)"/>

    <g transform="translate(120,42)">
      <rect width="100" height="76" fill="url(#block4)" stroke="#a78bfa"/>
      <text x="50" y="20" font-size="11" fill="#a78bfa" text-anchor="middle">Patchify 14</text>
      <text x="50" y="36" font-size="10" fill="#cbd5e1" text-anchor="middle">144 tokens</text>
      <text x="50" y="54" font-size="10" fill="#9ca3af" text-anchor="middle">+ pos embed</text>
    </g>

    <line x1="222" y1="80" x2="256" y2="80" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ar4)"/>

    <g transform="translate(258,42)">
      <rect width="100" height="76" fill="url(#block4)" stroke="#a78bfa"/>
      <text x="50" y="20" font-size="11" fill="#a78bfa" text-anchor="middle">Self-Attn × 4</text>
      <text x="50" y="36" font-size="10" fill="#cbd5e1" text-anchor="middle">d=128, 4 heads</text>
      <text x="50" y="54" font-size="10" fill="#9ca3af" text-anchor="middle">pre-norm</text>
    </g>

    <line x1="360" y1="80" x2="394" y2="80" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ar4)"/>

    <g transform="translate(396,42)">
      <rect width="100" height="76" fill="url(#block4)" stroke="#a78bfa"/>
      <text x="50" y="20" font-size="11" fill="#a78bfa" text-anchor="middle">FFN 128→512</text>
      <text x="50" y="36" font-size="10" fill="#cbd5e1" text-anchor="middle">→ 128</text>
      <text x="50" y="54" font-size="10" fill="#9ca3af" text-anchor="middle">GELU</text>
    </g>

    <line x1="446" y1="120" x2="446" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ar4)"/>

    <g transform="translate(0,170)">
      <rect width="500" height="50" fill="url(#block4)" stroke="#fbbf24"/>
      <text x="250" y="20" font-size="11" fill="#fbbf24" text-anchor="middle">Mean-pool 144 tokens → Dueling head (V + A)</text>
      <text x="250" y="38" font-size="10" fill="#9ca3af" text-anchor="middle">~1.0M params</text>
    </g>

    <g transform="translate(0,250)" font-size="11" fill="#cbd5e1">
      <text y="0" fill="#a78bfa" font-weight="bold">Properties</text>
      <text y="22">+ global attention from layer 1</text>
      <text y="40">+ scales to longer sequences</text>
      <text y="58">+ wins on POMDP / memory tasks</text>
      <text y="76">− no spatial prior — must learn it</text>
      <text y="94">− hyperparam-sensitive (diverges easily)</text>
    </g>

    <g transform="translate(0,360)" font-size="11" fill="#cbd5e1">
      <text y="0" fill="#a78bfa" font-weight="bold">Hyperparams (the changes that mattered)</text>
      <text y="22">batch 256 · LR 1e-4 · target sync 8000</text>
      <text y="40">warmup 80k · grad ratio 1:4 · 16 envs · dropout 0</text>
      <text y="58" fill="#34d399">+ Double DQN · Dueling heads · pre-norm · bf16</text>
    </g>
  </g>
</svg>
