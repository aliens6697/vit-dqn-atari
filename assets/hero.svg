<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a1340"/>
    </linearGradient>
    <linearGradient id="brick" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5d6c"/>
      <stop offset="100%" stop-color="#c92b3b"/>
    </linearGradient>
    <linearGradient id="brick2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="brick3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="brick4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="420" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <path d="M0 60 H1280 M0 120 H1280 M0 180 H1280 M0 240 H1280 M0 300 H1280 M0 360 H1280"/>
    <path d="M80 0 V420 M160 0 V420 M240 0 V420 M320 0 V420 M400 0 V420 M480 0 V420 M560 0 V420 M640 0 V420 M720 0 V420 M800 0 V420 M880 0 V420 M960 0 V420 M1040 0 V420 M1120 0 V420 M1200 0 V420"/>
  </g>

  <!-- LEFT: Atari Breakout mock -->
  <g transform="translate(60,60)">
    <rect x="0" y="0" width="320" height="300" rx="8" fill="#000" stroke="#22d3ee" stroke-width="2"/>
    <!-- bricks rows -->
    <g>
      <rect x="14" y="20"  width="42" height="18" fill="url(#brick)"/>
      <rect x="60" y="20"  width="42" height="18" fill="url(#brick)"/>
      <rect x="106" y="20" width="42" height="18" fill="url(#brick)"/>
      <rect x="152" y="20" width="42" height="18" fill="url(#brick)"/>
      <rect x="198" y="20" width="42" height="18" fill="url(#brick)"/>
      <rect x="244" y="20" width="42" height="18" fill="url(#brick)"/>

      <rect x="14" y="42"  width="42" height="18" fill="url(#brick2)"/>
      <rect x="60" y="42"  width="42" height="18" fill="url(#brick2)"/>
      <rect x="106" y="42" width="42" height="18" fill="url(#brick2)"/>
      <rect x="152" y="42" width="42" height="18" fill="url(#brick2)"/>
      <rect x="198" y="42" width="42" height="18" fill="url(#brick2)"/>
      <rect x="244" y="42" width="42" height="18" fill="url(#brick2)"/>

      <rect x="14" y="64"  width="42" height="18" fill="url(#brick3)"/>
      <rect x="60" y="64"  width="42" height="18" fill="url(#brick3)"/>
      <rect x="106" y="64" width="42" height="18" fill="url(#brick3)"/>
      <rect x="198" y="64" width="42" height="18" fill="url(#brick3)"/>
      <rect x="244" y="64" width="42" height="18" fill="url(#brick3)"/>

      <rect x="14" y="86"  width="42" height="18" fill="url(#brick4)"/>
      <rect x="60" y="86"  width="42" height="18" fill="url(#brick4)"/>
      <rect x="152" y="86" width="42" height="18" fill="url(#brick4)"/>
      <rect x="198" y="86" width="42" height="18" fill="url(#brick4)"/>
    </g>
    <!-- ball -->
    <circle cx="180" cy="200" r="6" fill="#fff" filter="url(#glow)"/>
    <!-- ball trail -->
    <circle cx="200" cy="180" r="3" fill="#fff" opacity="0.4"/>
    <circle cx="218" cy="160" r="2" fill="#fff" opacity="0.2"/>
    <!-- paddle -->
    <rect x="120" y="270" width="80" height="10" rx="3" fill="#22d3ee"/>
    <!-- score -->
    <text x="14" y="14" fill="#9ca3af" font-size="11">SCORE 412</text>
    <text x="270" y="14" fill="#9ca3af" font-size="11">x3</text>
  </g>

  <!-- arrow -->
  <g transform="translate(395,200)" stroke="url(#accent)" stroke-width="3" fill="none">
    <line x1="0" y1="10" x2="60" y2="10" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- MIDDLE: patches grid (ViT) -->
  <g transform="translate(470,80)">
    <rect x="-10" y="-22" width="280" height="270" rx="10" fill="#111827" stroke="#a78bfa" stroke-width="1.5" opacity="0.9"/>
    <text x="130" y="-4" fill="#a78bfa" font-size="13" text-anchor="middle">PATCH TOKENS</text>
    <g transform="translate(0,10)">
      <!-- 6x6 grid of patches with attention rays -->
      <g id="patches">
        <rect x="0"   y="0"   width="40" height="40" fill="#1f2937" stroke="#374151"/>
        <rect x="42"  y="0"   width="40" height="40" fill="#1f2937" stroke="#374151"/>
        <rect x="84"  y="0"   width="40" height="40" fill="#7c2d3f" stroke="#374151"/>
        <rect x="126" y="0"   width="40" height="40" fill="#7c2d3f" stroke="#374151"/>
        <rect x="168" y="0"   width="40" height="40" fill="#1f2937" stroke="#374151"/>
        <rect x="210" y="0"   width="40" height="40" fill="#1f2937" stroke="#374151"/>

        <rect x="0"   y="42"  width="40" height="40" fill="#1f2937" stroke="#374151"/>
        <rect x="42"  y="42"  width="40" height="40" fill="#3a2a4d" stroke="#374151"/>
        <rect x="84"  y="42"  width="40" height="40" fill="#1f2937" stroke="#374151"/>
        <rect x="126" y="42"  width="40" height="40" fill="#1f2937" stroke="#374151"/>
        <rect x="168" y="42"  width="40" height="40" fill="#3a2a4d" stroke="#374151"/>
        <rect x="210" y="42"  width="40" height="40" fill="#1f2937" stroke="#374151"/>

        <rect x="0"   y="84"  width="40" height="40" fill="#1f2937" stroke="#374151"/>
        <rect x="42"  y="84"  width="40" height="40" fill="#1f2937" stroke="#374151"/>
        <rect x="84"  y="84"  width="40" height="40" fill="#1c4840" stroke="#22d3ee" stroke-width="2"/>
        <rect x="126" y="84"  width="40" height="40" fill="#1f2937" stroke="#374151"/>
        <rect x="168" y="84"  width="40" height="40" fill="#1f2937" stroke="#374151"/>
        <rect x="210" y="84"  width="40" height="40" fill="#1f2937" stroke="#374151"/>

        <rect x="0"   y="126" width="40" height="40" fill="#1f2937" stroke="#374151"/>
        <rect x="42"  y="126" width="40" height="40" fill="#1f2937" stroke="#374151"/>
        <rect x="84"  y="126" width="40" height="40" fill="#1f2937" stroke="#374151"/>
        <rect x="126" y="126" width="40" height="40" fill="#1f2937" stroke="#374151"/>
        <rect x="168" y="126" width="40" height="40" fill="#1f2937" stroke="#374151"/>
        <rect x="210" y="126" width="40" height="40" fill="#1f2937" stroke="#374151"/>

        <rect x="0"   y="168" width="40" height="40" fill="#1f2937" stroke="#374151"/>
        <rect x="42"  y="168" width="40" height="40" fill="#1f2937" stroke="#374151"/>
        <rect x="84"  y="168" width="40" height="40" fill="#1f2937" stroke="#374151"/>
        <rect x="126" y="168" width="40" height="40" fill="#1f2937" stroke="#374151"/>
        <rect x="168" y="168" width="40" height="40" fill="#264653" stroke="#22d3ee"/>
        <rect x="210" y="168" width="40" height="40" fill="#1f2937" stroke="#374151"/>
      </g>

      <!-- attention rays from a center patch -->
      <g stroke="#22d3ee" stroke-width="1" opacity="0.5">
        <line x1="104" y1="104" x2="20"  y2="20"/>
        <line x1="104" y1="104" x2="230" y2="20"/>
        <line x1="104" y1="104" x2="62"  y2="62"/>
        <line x1="104" y1="104" x2="188" y2="62"/>
        <line x1="104" y1="104" x2="188" y2="188"/>
      </g>
    </g>
  </g>

  <!-- arrow 2 -->
  <g transform="translate(770,200)" stroke="url(#accent)" stroke-width="3" fill="none">
    <line x1="0" y1="10" x2="60" y2="10" marker-end="url(#arrow)"/>
  </g>

  <!-- RIGHT: Q-values -->
  <g transform="translate(850,80)">
    <rect x="0" y="0" width="370" height="260" rx="10" fill="#111827" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="185" y="22" fill="#22d3ee" font-size="13" text-anchor="middle">Q-VALUES</text>

    <g transform="translate(20,50)" font-size="12" fill="#e5e7eb">
      <text x="0" y="14">NOOP</text>
      <rect x="80"  y="0"  width="80"  height="18" fill="#1f2937" stroke="#374151"/>
      <rect x="80"  y="0"  width="48"  height="18" fill="#60a5fa"/>
      <text x="170" y="14" fill="#60a5fa">0.42</text>

      <text x="0" y="48">FIRE</text>
      <rect x="80"  y="34" width="80"  height="18" fill="#1f2937" stroke="#374151"/>
      <rect x="80"  y="34" width="64"  height="18" fill="#34d399"/>
      <text x="170" y="48" fill="#34d399">0.71</text>

      <text x="0" y="82">RIGHT</text>
      <rect x="80"  y="68" width="80"  height="18" fill="#1f2937" stroke="#374151"/>
      <rect x="80"  y="68" width="78"  height="18" fill="#fbbf24"/>
      <text x="170" y="82" fill="#fbbf24">0.94</text>

      <text x="0" y="116">LEFT</text>
      <rect x="80"  y="102" width="80" height="18" fill="#1f2937" stroke="#374151"/>
      <rect x="80"  y="102" width="38" height="18" fill="#a78bfa"/>
      <text x="170" y="116" fill="#a78bfa">0.31</text>
    </g>

    <g transform="translate(20,200)" font-size="11" fill="#9ca3af">
      <text x="0" y="0">argmax → action: RIGHT</text>
      <rect x="0" y="10" width="330" height="2" fill="url(#accent)"/>
      <text x="0" y="32" fill="#22d3ee" font-size="14">paddle moves →</text>
    </g>
  </g>

  <!-- title -->
  <g transform="translate(60,28)">
    <text font-size="20" fill="#fff" font-weight="bold">ViT-DQN</text>
    <text x="105" font-size="20" fill="#a78bfa">·</text>
    <text x="118" font-size="14" fill="#9ca3af">Vision Transformer plays Atari</text>
  </g>

  <!-- footer tags -->
  <g transform="translate(60,388)" font-size="11" fill="#6b7280">
    <text>pixels  ·  84×84  ·  patch 14  ·  d_model 128  ·  4 heads × 4 layers  ·  Double + Dueling DQN  ·  bf16</text>
  </g>
</svg>
