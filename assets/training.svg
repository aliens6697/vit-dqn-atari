<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 600" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="block3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="ar2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#22d3ee"/>
    </marker>
    <marker id="ar3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="1280" height="600" fill="url(#bg3)"/>

  <text x="40" y="40" font-size="22" fill="#fff" font-weight="bold">Training loop · Double DQN</text>
  <text x="40" y="60" font-size="12" fill="#9ca3af">16 parallel envs · 80k warmup · 1 grad step / 4 env steps · target sync 8000</text>

  <!-- 16 envs -->
  <g transform="translate(40,100)">
    <rect width="220" height="120" rx="8" fill="url(#block3)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="110" y="22" font-size="13" fill="#22d3ee" text-anchor="middle">16 Atari envs (async)</text>
    <g transform="translate(20,38)">
      <rect x="0"   y="0"  width="14" height="14" fill="#0b1020" stroke="#22d3ee"/>
      <rect x="18"  y="0"  width="14" height="14" fill="#0b1020" stroke="#22d3ee"/>
      <rect x="36"  y="0"  width="14" height="14" fill="#0b1020" stroke="#22d3ee"/>
      <rect x="54"  y="0"  width="14" height="14" fill="#0b1020" stroke="#22d3ee"/>
      <rect x="72"  y="0"  width="14" height="14" fill="#0b1020" stroke="#22d3ee"/>
      <rect x="90"  y="0"  width="14" height="14" fill="#0b1020" stroke="#22d3ee"/>
      <rect x="108" y="0"  width="14" height="14" fill="#0b1020" stroke="#22d3ee"/>
      <rect x="126" y="0"  width="14" height="14" fill="#0b1020" stroke="#22d3ee"/>
      <rect x="0"   y="20" width="14" height="14" fill="#0b1020" stroke="#22d3ee"/>
      <rect x="18"  y="20" width="14" height="14" fill="#0b1020" stroke="#22d3ee"/>
      <rect x="36"  y="20" width="14" height="14" fill="#0b1020" stroke="#22d3ee"/>
      <rect x="54"  y="20" width="14" height="14" fill="#0b1020" stroke="#22d3ee"/>
      <rect x="72"  y="20" width="14" height="14" fill="#0b1020" stroke="#22d3ee"/>
      <rect x="90"  y="20" width="14" height="14" fill="#0b1020" stroke="#22d3ee"/>
      <rect x="108" y="20" width="14" height="14" fill="#0b1020" stroke="#22d3ee"/>
      <rect x="126" y="20" width="14" height="14" fill="#0b1020" stroke="#22d3ee"/>
    </g>
    <text x="110" y="100" font-size="10" fill="#9ca3af" text-anchor="middle">vector observations (B, 4, 84, 84)</text>
  </g>

  <!-- arrow to policy -->
  <line x1="265" y1="160" x2="320" y2="160" stroke="#22d3ee" stroke-width="2" marker-end="url(#ar2)"/>
  <text x="270" y="155" font-size="10" fill="#9ca3af">states</text>

  <!-- policy net -->
  <g transform="translate(330,100)">
    <rect width="200" height="120" rx="8" fill="url(#block3)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="100" y="22" font-size="13" fill="#a78bfa" text-anchor="middle">Policy network (ViT)</text>
    <g transform="translate(30,40)" font-size="10" fill="#cbd5e1">
      <rect width="140" height="22" fill="#1e293b" stroke="#a78bfa"/>
      <text x="70" y="15" text-anchor="middle">forward(states)</text>
      <text x="70" y="44" text-anchor="middle" fill="#9ca3af">argmax → action</text>
      <text x="70" y="62" text-anchor="middle" fill="#fbbf24">ε-greedy: 1.0 → 0.01</text>
    </g>
  </g>

  <!-- arrow to env -->
  <line x1="430" y1="220" x2="430" y2="265" stroke="#22d3ee" stroke-width="2" marker-end="url(#ar2)"/>
  <text x="440" y="240" font-size="10" fill="#9ca3af">action</text>

  <!-- env step -->
  <g transform="translate(330,265)">
    <rect width="200" height="55" rx="8" fill="url(#block3)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="100" y="22" font-size="12" fill="#22d3ee" text-anchor="middle">env.step(action)</text>
    <text x="100" y="42" font-size="10" fill="#9ca3af" text-anchor="middle">reward · next_state · done</text>
  </g>

  <!-- arrow to replay -->
  <line x1="430" y1="325" x2="430" y2="365" stroke="#22d3ee" stroke-width="2" marker-end="url(#ar2)"/>
  <text x="440" y="345" font-size="10" fill="#9ca3af">push transition</text>

  <!-- replay buffer -->
  <g transform="translate(280,365)">
    <rect width="300" height="100" rx="8" fill="url(#block3)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="150" y="22" font-size="13" fill="#fbbf24" text-anchor="middle">Replay buffer · 500k · uint8</text>
    <g transform="translate(20,38)" font-size="10" fill="#cbd5e1">
      <rect width="260" height="14" fill="#1e293b" stroke="#475569"/>
      <rect width="220" height="14" fill="#fbbf24" opacity="0.5"/>
      <text x="130" y="11" text-anchor="middle" fill="#0f172a">(s, a, r, s', done)</text>
      <text x="130" y="36" text-anchor="middle" fill="#9ca3af">~14 GB · pre-allocated numpy</text>
      <text x="130" y="54" text-anchor="middle" fill="#9ca3af">sample 256 random transitions</text>
    </g>
  </g>

  <!-- arrow to train -->
  <line x1="580" y1="415" x2="640" y2="415" stroke="#a78bfa" stroke-width="2" marker-end="url(#ar3)"/>
  <text x="585" y="408" font-size="10" fill="#9ca3af">batch</text>

  <!-- train step -->
  <g transform="translate(650,355)">
    <rect width="290" height="180" rx="8" fill="url(#block3)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="145" y="22" font-size="13" fill="#a78bfa" text-anchor="middle">Train step · Double DQN</text>

    <g transform="translate(20,42)" font-size="10" fill="#cbd5e1">
      <rect width="250" height="22" fill="#1e293b" stroke="#a78bfa"/>
      <text x="125" y="15" text-anchor="middle">a* = argmax_a policy(s')</text>

      <rect y="28" width="250" height="22" fill="#1e293b" stroke="#34d399"/>
      <text x="125" y="43" text-anchor="middle" fill="#34d399">y = r + γ · target(s')[a*] · (1−done)</text>

      <rect y="56" width="250" height="22" fill="#1e293b" stroke="#fbbf24"/>
      <text x="125" y="71" text-anchor="middle" fill="#fbbf24">loss = HuberLoss( policy(s)[a], y )</text>

      <rect y="84" width="250" height="22" fill="#1e293b" stroke="#60a5fa"/>
      <text x="125" y="99" text-anchor="middle">backward · clip_grad 10 · Adam step</text>

      <text x="125" y="125" text-anchor="middle" fill="#9ca3af">bf16 autocast · grad ratio 1:4</text>
    </g>
  </g>

  <!-- target net -->
  <g transform="translate(960,360)">
    <rect width="280" height="170" rx="8" fill="url(#block3)" stroke="#34d399" stroke-width="1.5"/>
    <text x="140" y="22" font-size="13" fill="#34d399" text-anchor="middle">Target network (frozen)</text>
    <g transform="translate(20,42)" font-size="10" fill="#cbd5e1">
      <rect width="240" height="22" fill="#1e293b" stroke="#34d399"/>
      <text x="120" y="15" text-anchor="middle">same arch · separate weights</text>
      <text x="120" y="44" text-anchor="middle" fill="#9ca3af">used only to compute y</text>
      <text x="120" y="64" text-anchor="middle" fill="#fbbf24">sync every 8000 env steps</text>
      <text x="120" y="92" text-anchor="middle" fill="#9ca3af">≈ 2000 grad updates between syncs</text>
      <text x="120" y="112" text-anchor="middle" fill="#9ca3af">→ stable bootstrap targets</text>
    </g>
  </g>

  <!-- sync arrow -->
  <line x1="940" y1="410" x2="970" y2="410" stroke="#34d399" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#ar2)"/>
  <text x="932" y="402" font-size="10" fill="#34d399" text-anchor="end">copy weights</text>

  <!-- footer hyperparams -->
  <g transform="translate(40,545)" font-size="11" fill="#9ca3af">
    <text>HYPERPARAMS · LR 1e-4 · batch 256 · γ 0.99 · ε 1.0→0.01 over 1M · grad clip 10 · Adam(eps=1.5e-4) · dropout 0</text>
  </g>
</svg>
